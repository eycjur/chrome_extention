<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Subtitle Translator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <h1>YouTube 字幕翻訳</h1>
      <div class="version">v1.0.0</div>
    </div>

    <div class="content">
      <div class="settings-section">
        <div class="setting-item api-key-item">
          <label for="deeplApiKey">DeepL API Key:</label>
          <input type="password" id="deeplApiKey" placeholder="DeepL APIキーを入力">
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
