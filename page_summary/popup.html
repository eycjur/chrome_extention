<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI ページ要約 – 設定</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-wrap">
    <!-- Header -->
    <header class="popup-header">
      <div class="popup-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="popup-header-text">
        <h1>AI ページ要約</h1>
        <p>設定</p>
      </div>
    </header>

    <!-- Quick Action -->
    <section class="popup-section">
      <button id="summarize-now-btn" class="btn-primary btn-block">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        このページを今すぐ要約
      </button>
    </section>

    <div class="popup-divider"></div>

    <!-- API Key -->
    <section class="popup-section">
      <label class="form-label" for="api-key-input">
        Google AI API Key
        <a href="https://aistudio.google.com/app/apikey" target="_blank" class="form-label-link">
          取得する ↗
        </a>
      </label>
      <div class="input-group">
        <input
          id="api-key-input"
          class="form-input"
          type="password"
          placeholder="AIza..."
          autocomplete="off"
          spellcheck="false"
        >
        <button id="toggle-visibility-btn" class="input-suffix-btn" title="表示/非表示">
          <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            style="display:none">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
      <p class="form-hint">キーはブラウザのローカルストレージに保存されます</p>
    </section>

    <!-- Model -->
    <section class="popup-section">
      <label class="form-label" for="model-select">使用モデル</label>
      <select id="model-select" class="form-select">
        <option value="gemini-2.5-flash-lite" selected>Gemini 2.5 Flash Lite (速い・安い・推奨)</option>
        <option value="gemini-2.5-flash">Gemini 2.5 Flash (バランス)</option>
        <option value="gemini-2.5-pro">Gemini 2.5 Pro (高品質)</option>
      </select>
    </section>

    <!-- Save / Status -->
    <section class="popup-section popup-section-actions">
      <button id="save-btn" class="btn-primary">保存する</button>
      <div id="status-msg" class="status-msg" style="display:none"></div>
    </section>

    <!-- Usage hint -->
    <footer class="popup-footer">
      <p>使い方: ページ上のフローティングボタン または 右クリック → 「このページを AI で要約する」</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
